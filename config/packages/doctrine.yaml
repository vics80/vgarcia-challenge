doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '8.4'
        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        types:
            vending_machine_id: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\VendingMachineIdType
            product_id: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductIdType
            order_id: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\OrderIdType
            product_name: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductNameType
            product_selector: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductSelectorType
            product_price: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductPriceType
            product_stock_quantity: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductStockQuantityType
            order_total_amount: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\OrderTotalAmountType
            money: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\MoneyType
            product_inventory: App\VgarciaChallenge\Vending\Infrastructure\Persistence\Doctrine\Type\ProductInventoryType
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: false
        mappings:
            Vending:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/VgarciaChallenge/Vending/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\VgarciaChallenge\Vending\Domain'
                alias: Vending
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
