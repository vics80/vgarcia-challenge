services:
  app:
    build:
      target: ${APP_ENV:-dev}
      context: .
      dockerfile: etc/frankenphp/Dockerfile
    container_name: vgarcia-challenge
    ports:
      - "${CADDY_PORT:-8001}:80"
    volumes:
      - .:/srv/app
      - ./etc/frankenphp/Caddyfile:/etc/caddy/Caddyfile
    environment:
      - PHP_MEMORY_LIMIT=256M
      - FRANKENPHP_CONFIG_FILE=/etc/caddy/Caddyfile
      - PORT=80
    depends_on:
      database:
        condition: service_healthy
    networks:
      - vgarcia-challenge

  database:
    image: mysql:8.4
    deploy:
      replicas: 1
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vgarcia}
      MYSQL_USER: ${MYSQL_USER:-vgarcia_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-vgarcia_user}", "-p${MYSQL_PASSWORD:-secret}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - vgarcia-challenge

volumes:
  mysql_data:
    driver: local

networks:
    vgarcia-challenge:
        driver: bridge
